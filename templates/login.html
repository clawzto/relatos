{% extends "base.html" %}

{% block title %}Iniciar Sesión - Relatos IA{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg border-0">
                <div class="card-header bg-primary text-white py-4">
                    <h2 class="mb-0 text-center">🔐 Iniciar Sesión</h2>
                </div>
                <div class="card-body p-5">
                    <form method="post" action="{{ url_for('login') }}" novalidate>
                        <div class="mb-3">
                            <label for="email" class="form-label">📧 Email</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">🔑 Contraseña</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Iniciar Sesión</button>
                    </form>
                    <hr class="my-4">
                    <p class="text-center text-muted mb-0">
                        ¿No tienes cuenta? <a href="{{ url_for('registro') }}" class="text-primary fw-bold">Regístrate aquí</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
