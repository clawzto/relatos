{% extends "base.html" %}

{% block title %}Crear Cuenta - Relatos IA{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg border-0">
                <div class="card-header bg-success text-white py-4">
                    <h2 class="mb-0 text-center">📝 Crear Cuenta</h2>
                </div>
                <div class="card-body p-5">
                    <form method="post" action="{{ url_for('registro') }}" novalidate>
                        <div class="mb-3">
                            <label for="nombre" class="form-label">👤 Nombre Completo</label>
                            <input type="text" class="form-control" id="nombre" name="nombre" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">📧 Email</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">🔑 Contraseña</label>
                            <input type="password" class="form-control" id="password" name="password" required minlength="6">
                            <small class="text-muted">Mínimo 6 caracteres</small>
                        </div>
                        <div class="mb-4">
                            <label for="password2" class="form-label">🔑 Confirmar Contraseña</label>
                            <input type="password" class="form-control" id="password2" name="password2" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100 py-2 fw-bold">Crear Cuenta</button>
                    </form>
                    <hr class="my-4">
                    <p class="text-center text-muted mb-0">
                        ¿Ya tienes cuenta? <a href="{{ url_for('login') }}" class="text-success fw-bold">Inicia sesión</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
